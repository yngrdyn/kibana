responses:
  200:
    description: 'Successful response'
    content:
      application/json:
        examples:
          rotateUninstallTokenExample:
            description: 'Uninstall token rotated successfully for the given agent policy'
            value:
              message: 'Uninstall token rotated successfully.'
  400:
    description: 'Bad Request'
    content:
      application/json:
        examples:
          notProtectedExample:
            description: 'Agent policy does not have tamper protection enabled'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'Agent policy [policy-id-1] does not have tamper protection enabled. Uninstall tokens can only be rotated for protected policies.'
          genericErrorResponseExample:
            description: 'Example of a generic error response'
            value:
              statusCode: 400
              error: 'Bad Request'
              message: 'An error message describing what went wrong'
  404:
    description: 'Not Found'
    content:
      application/json:
        examples:
          notFoundExample:
            description: 'No agent policy was found with the given ID'
            value:
              statusCode: 404
              error: 'Not Found'
              message: 'Agent policy not found with id policy-id-1'
