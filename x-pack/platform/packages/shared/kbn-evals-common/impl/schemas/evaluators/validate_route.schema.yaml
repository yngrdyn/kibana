openapi: 3.0.0
info:
  title: Validate Evals Evaluator Evidence API endpoint
  version: '1'
paths:
  /internal/evals/evaluators/_validate:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: Validate
      description: Validates evaluator evidence requirements against a trace
      summary: Validate evaluator evidence
      tags:
        - Evals API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subject
                - evaluators
              properties:
                subject:
                  type: object
                  required:
                    - traces
                  properties:
                    mode:
                      type: string
                      enum:
                        - single-turn
                        - multi-turn
                      default: single-turn
                    traces:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        type: object
                        required:
                          - trace_id
                        properties:
                          trace_id:
                            type: string
                            maxLength: 256
                          reference_data:
                            type: object
                            additionalProperties: true
                    instrumentation:
                      type: object
                      description: >-
                        Optional instrumentation profile selection. When omitted,
                        the elastic-inference profile is used.
                      required:
                        - profile
                      properties:
                        profile:
                          type: string
                          enum:
                            - elastic-inference
                            - otel-genai-events
                            - otel-genai-attributes
                            - claude-code
                          default: elastic-inference
                evaluators:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        maxLength: 256
                      version:
                        type: string
                        maxLength: 64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - evaluators
                properties:
                  evaluators:
                    type: array
                    items:
                      type: object
                      required:
                        - name
                        - version
                        - ready
                        - unmet
                      properties:
                        name:
                          type: string
                          maxLength: 256
                        version:
                          type: string
                          maxLength: 64
                        ready:
                          type: boolean
                        unmet:
                          type: array
                          items:
                            type: string
                            maxLength: 1024
                        remediation:
                          type: string
                          maxLength: 2048
