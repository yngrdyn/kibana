openapi: 3.0.0
info:
  title: Evaluate API endpoint
  version: '1'
paths:
  /internal/evals/_evaluate:
    post:
      x-codegen-enabled: true
      x-labels: [ess, serverless]
      operationId: Evaluate
      description: Executes one or more evaluators against a subject
      summary: Evaluate
      tags:
        - Evals API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subject
                - evaluators
              properties:
                subject:
                  type: object
                  required:
                    - traces
                  properties:
                    mode:
                      type: string
                      enum:
                        - single-turn
                        - multi-turn
                      default: single-turn
                    traces:
                      type: array
                      minItems: 1
                      maxItems: 1
                      items:
                        type: object
                        required:
                          - trace_id
                        properties:
                          trace_id:
                            type: string
                            maxLength: 256
                          reference_data:
                            type: object
                            additionalProperties: true
                    instrumentation:
                      type: object
                      description: >-
                        Optional instrumentation profile selection. When omitted,
                        the elastic-inference profile is used.
                      required:
                        - profile
                      properties:
                        profile:
                          type: string
                          enum:
                            - elastic-inference
                            - otel-genai-events
                            - otel-genai-attributes
                            - claude-code
                          default: elastic-inference
                evaluators:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        maxLength: 256
                      version:
                        type: string
                        maxLength: 64
                      connector_id:
                        type: string
                        maxLength: 256
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - status
                        - evaluator
                      properties:
                        status:
                          type: string
                          enum:
                            - ok
                            - error
                        evaluator:
                          type: object
                          required:
                            - name
                            - version
                            - kind
                          properties:
                            name:
                              type: string
                              maxLength: 256
                            version:
                              type: string
                              maxLength: 64
                            kind:
                              type: string
                              enum:
                                - llm
                                - code
                        scores:
                          type: array
                          items:
                            type: object
                            required:
                              - name
                            properties:
                              name:
                                type: string
                                maxLength: 256
                              score:
                                type: number
                                nullable: true
                              label:
                                type: string
                                maxLength: 1024
                              explanation:
                                type: string
                                maxLength: 8192
                              metadata:
                                type: object
                                additionalProperties: true
                        error:
                          type: object
                          required:
                            - message
                          properties:
                            code:
                              type: string
                              enum:
                                - evidence_unmet
                            message:
                              type: string
                              maxLength: 8192
