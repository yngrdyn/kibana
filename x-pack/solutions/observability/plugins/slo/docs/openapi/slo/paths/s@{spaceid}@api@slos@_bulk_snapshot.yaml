post:
  summary: Compute SLO instance summaries in bulk at a point in time
  operationId: bulkSnapshotOp
  x-state: 'Generally available; added in 9.6.0'
  description: >
    Compute the summary of multiple SLO instances at a given point in time.
    The endpoint is synchronous and returns results directly.
    Each result contains either a summary (on success) or a per-instance error.
    The list of requests is limited to 100 entries.
    When `instanceId` is omitted or set to `'*'`, the API returns a result for each matching instance (up to 1000 per SLO).
    You must have the `read` privileges for the **SLOs** feature in the
    **Observability** section of the Kibana feature privileges.
  tags:
    - slo
  parameters:
    - $ref: ../components/headers/kbn_xsrf.yaml
    - $ref: ../components/parameters/space_id.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/bulk_snapshot_request.yaml'
        examples:
          bulkSnapshotRequest:
            summary: Compute snapshots for two SLO instances
            value:
              at: '2025-01-12T10:00:00.000Z'
              requests:
                - id: 8853df00-ae2e-11ed-90af-09bb6422b258
                  instanceId: '*'
                - id: d077e940-1515-11ee-9c50-9d096392f520
                  instanceId: 'host.name:web-01'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/snapshot_response.yaml'
          examples:
            bulkSnapshotResponse:
              summary: Bulk snapshot response with mixed success and per-instance error
              value:
                at: '2025-01-12T10:00:00.000Z'
                results:
                  - id: 8853df00-ae2e-11ed-90af-09bb6422b258
                    instanceId: '*'
                    summary:
                      status: HEALTHY
                      sliValue: 0.9976
                      errorBudget:
                        initial: 0.01
                        consumed: 0.24
                        remaining: 0.76
                      good: 9976
                      total: 10000
                  - id: d077e940-1515-11ee-9c50-9d096392f520
                    instanceId: 'host.name:web-01'
                    error:
                      statusCode: 404
                      message: 'SLO [d077e940-1515-11ee-9c50-9d096392f520] not found'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/400_response.yaml'
          examples:
            badRequestExample:
              summary: Bad request
              value:
                statusCode: 400
                error: Bad Request
                message: '`requests` is limited to 100 entries'
    '401':
      description: Unauthorized response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/401_response.yaml'
          examples:
            unauthorizedExample:
              summary: Unauthorized
              value:
                statusCode: 401
                error: Unauthorized
                message: "security_exception: unable to authenticate user for REST request [/api/observability/slos]"
    '403':
      description: Forbidden response
      content:
        application/json:
          schema:
            $ref: '../components/schemas/403_response.yaml'
          examples:
            forbiddenExample:
              summary: Forbidden
              value:
                statusCode: 403
                error: Forbidden
                message: "security_exception: action [slo_read] is unauthorized for user"
