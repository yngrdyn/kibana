    description: "Strip PUT /api/dashboards/{id} down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards/{id}'].delete"
    description: "Strip DELETE /api/dashboards/{id} down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards/{id}']"
    description: "Re-inject minimal GET, PUT, DELETE for /api/dashboards/{id}"
    update:
      get:
        tags:
          - Dashboards
        summary: "Get a dashboard"
        operationId: get-dashboard-redirect
        description: |
          > This documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://elastic.github.io/dashboards-api-spec/dashboards#tag/Dashboards)**
        responses:
          '200':
            description: See the full Dashboards API reference for detailed response schemas.
      put:
        tags:
          - Dashboards
        summary: "Update a dashboard"
        operationId: update-dashboard-redirect
        description: |
          > This documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://elastic.github.io/dashboards-api-spec/dashboards#tag/Dashboards)**
        responses:
          '200':
            description: See the full Dashboards API reference for detailed response schemas.
      delete:
