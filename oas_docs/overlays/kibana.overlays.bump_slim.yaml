overlay: 1.0.0
info:
  title: Bump slim overlay for external Dashboards & Visualizations references
  version: 0.0.1
  # ⚠️  TEMPORARY — retire this file when the primary API docs can render the full
  # Dashboards and Visualizations schemas.
  # See https://github.com/elastic/kibana/issues/266195 for the full revert checklist.
  # Current external hosting: https://elastic.github.io/dashboards-api-spec/

actions:
  # ──────────────────────────────────────────────
  # DASHBOARDS
  # Strategy: strip each operation down to just a redirect notice.
  # - Remove real operation (parameters, requestBody, responses, description)
  # - Re-inject a minimal shell with the external-reference notice as the sole description
  # This keeps every endpoint visible in the Bump nav while rendering nothing
  # except the link to the external full reference.
  #
  # ⚠️  Ordering dependency: the remove actions MUST run before the update (re-inject)
  # actions for the same path. The Bump overlay spec processes actions top-to-bottom,
  # so this ordering is currently guaranteed by the sequence in this file. If Bump ever
  # changes this behaviour, the re-injected shells would be overwritten by the removes
  # and the endpoints would disappear from the nav entirely.
  # ──────────────────────────────────────────────

  # Keep these URLs aligned with the external API documentation.
  - target: "$.paths['/api/dashboards'].get"
    description: "Strip GET /api/dashboards down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards'].post"
    description: "Strip POST /api/dashboards down to redirect notice"
    remove: true
  - target: "$.paths['/api/dashboards']"
    description: "Re-inject minimal GET and POST for /api/dashboards"
    update:
      get:
        tags:
          - Dashboards
        summary: "Get dashboards"
        operationId: get-dashboards-redirect
        description: |
          > This documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://elastic.github.io/dashboards-api-spec/dashboards#tag/Dashboards)**
        responses:
          '200':
            description: See the full Dashboards API reference for detailed response schemas.
      post:
        tags:
          - Dashboards
        summary: "Create a dashboard"
        operationId: create-dashboard-redirect
        description: |
          > This documentation is temporarily hosted at a separate location.
          >
          > **[View the full Dashboards API reference →](https://elastic.github.io/dashboards-api-spec/dashboards#tag/Dashboards)**
        responses:
          '200':
            description: See the full Dashboards API reference for detailed response schemas.

