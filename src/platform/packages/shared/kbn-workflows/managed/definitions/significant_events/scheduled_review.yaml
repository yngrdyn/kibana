version: "1"
name: "Significant Events Scheduled Review"
description: "Runs bounded Significant Events discovery and triage passes on a schedule for the current space."
enabled: false
tags:
  - observability
  - streams
  - significant-events
  - scheduled
  - review
settings:
  concurrency:
    key: "significant-events-scheduled-review"
    strategy: drop
    max: 1
triggers:
  - type: scheduled
    with:
      every: "__REVIEW_INTERVAL_MINUTES__m"
  - type: manual
steps:
  - name: run_review_until_drained
    type: while
    # Re-run only while a child still reports queued work. A child error is
    # deliberately NOT part of this condition and the child steps have no
    # `on-failure: continue`, so the first failing pass bails out of the loop and
    # fails the run — surfacing the error instead of spinning until
    # `max-iterations` is exhausted.
    condition: "${{ steps.discover.output.hasRemaining == true or steps.triage.output.hasRemaining == true }}"
    max-iterations: __MAX_REVIEW_PASSES__
    # Bound each pass to discovery (20m) + triage (30m) worst case instead of
    # capping the whole loop with a single, necessarily-too-small workflow-level
    # timeout.
    iteration-timeout: "50m"
    steps:
      - name: discover
        type: workflow.execute
        with:
          workflow-id: "system-significant-events-discovery"
          inputs:
            detectionBatchMax: __DISCOVERY_BATCH_SIZE__

      - name: triage
        type: workflow.execute
        with:
          workflow-id: "system-significant-events-triage"
          inputs:
            discoveryBatchMax: __TRIAGE_BATCH_SIZE__
