version: '1'
name: 'Significant Events Triage'
description: 'Analyses unreviewed discoveries with a judge agent and creates significant events.'
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - triage
settings:
  timeout: '30m'
  concurrency:
    key: significant-events-triage
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: discoveryLookback
        type: string
        default: 'now-7d'
        required: false
        description: 'Lookback window for active discoveries. Should match .significant_events-discoveries retention.'
      - name: discoveryBatchMax
        type: number
        default: 10
        required: false
        description: 'Max discoveries per judge invocation. Caps agent message size; remaining discoveries are picked up on the next cycle.'

outputs:
  - name: candidateCount
    type: number
  - name: processedCount
    type: number
  - name: remainingCount
    type: number
  - name: hasRemaining
    type: boolean
  - name: queueEmpty
    type: boolean
  - name: noWork
    type: boolean

consts:
  DISCOVERIES_INDEX: '.significant_events-discoveries'
  EVENTS_INDEX: '.significant_events-events'
  KIND_DISCOVERY: 'discovery'
  KIND_HANDLED: 'handled'
  SCAN_BATCH_SIZE: 100
  INVESTIGATABLE_SEVERITIES: ['80-critical', '60-high']
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_space_vars
    type: data.set
    with:
      spaceId: '{{ workflow.spaceId }}'

  # -----------------------------------------------------------------------
  # Step 1: Fetch unassessed discoveries — latest doc per event_id. Scan SCAN_BATCH_SIZE to avoid kind:handled docs (newer
  # timestamps) crowding out unprocessed events in the size cap; handled events
  # are filtered out in collect_discoveries and the result is capped there.
  # -----------------------------------------------------------------------
  - name: get_unassessed_discoveries
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: '${{ consts.SCAN_BATCH_SIZE }}'
        sort:
          - '@timestamp':
              order: desc
          - severity:
              order: desc
              missing: '_last'
              unmapped_type: keyword
        collapse:
          field: event_id
        _source:
          includes:
            - '@timestamp'
            - kind
            - discovery_id
            - event_id
            - title
            - symptom_hypothesis
            - summary
            - severity
            - confidence
            - signals
            - stream_names
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: '{{ variables.spaceId }}'
              - range:
                  '@timestamp':
                    gte: '{{ inputs.discoveryLookback }}'
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 2: Filter to only unassessed events.
  # -----------------------------------------------------------------------
  - name: collect_discovery_candidates
    type: data.set
    with:
      findings: >-
        ${{ steps.get_unassessed_discoveries.output.hits.hits
          | map: '_source'
          | reject: 'kind', 'handled'
          | default: [] }}

  - name: collect_discoveries
    type: data.set
    with:
      findings: >-
        ${{ steps.collect_discovery_candidates.output.findings
          | slice: 0, inputs.discoveryBatchMax
          | default: [] }}

  # NOTE: cross-step references chaining a `.size` property accessor (e.g.
  # `steps.x.output.findings.size`) resolve to undefined once referenced from
  # the 3rd+ step of the workflow — an engine quirk with the dot-notation size
  # getter. The `| size` filter does not have this issue, but filter chains
  # cannot be followed by comparison operators in the same expression, so raw
  # sizes are computed here and derived stats are computed from those (plain
  # number) outputs in a separate step below.
  - name: compute_queue_sizes
    type: data.set
    with:
      candidateCount: '${{ steps.collect_discovery_candidates.output.findings | size | default: 0 }}'
      processedCount: '${{ steps.collect_discoveries.output.findings | size | default: 0 }}'

  - name: compute_queue_stats
    type: data.set
    with:
      candidateCount: '${{ steps.compute_queue_sizes.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_sizes.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_sizes.output.candidateCount | minus: steps.compute_queue_sizes.output.processedCount | at_least: 0 }}'
      hasRemaining: '${{ steps.compute_queue_sizes.output.candidateCount > steps.compute_queue_sizes.output.processedCount }}'
      queueEmpty: '${{ steps.compute_queue_sizes.output.candidateCount <= steps.compute_queue_sizes.output.processedCount }}'

  # -----------------------------------------------------------------------
  # Step 3: Exit early when there is nothing to triage.
  # -----------------------------------------------------------------------
  - name: output_no_discoveries
    type: workflow.output
    if: '${{ steps.compute_queue_sizes.output.processedCount == 0 }}'
    with:
      candidateCount: '${{ steps.compute_queue_stats.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_stats.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_stats.output.remainingCount }}'
      hasRemaining: '${{ steps.compute_queue_stats.output.hasRemaining }}'
      queueEmpty: '${{ steps.compute_queue_stats.output.queueEmpty }}'
      noWork: true

  # -----------------------------------------------------------------------
  # Step 4: Judge — evaluate unreviewed discoveries.
  # -----------------------------------------------------------------------
  - name: run_judge_agent
    type: ai.agent
    agent-id: "platform.streams.sig-events.discovery-judge"
    # Keep connector-id-by-feature/plugin-id/aggregate-by in sync with @kbn/significant-events-schema
    # inference_feature_ids.ts (SIGNIFICANT_EVENTS_TRIAGE_INFERENCE_FEATURE_ID /
    # SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID). Own feature — judge is a lighter,
    # cheaper classification step than discovery and should default to its own model tier.
    connector-id-by-feature: 'significant_events_triage'
    plugin-id: 'significant_events_triage'
    aggregate-by: 'significant_events'
    create-conversation: true
    with:
      message: |
        ## Unreviewed Discoveries

        {{ steps.collect_discoveries.output.findings | json }}
      schema:
        type: object
        properties:
          significant_events:
            type: array
            description: 'Compact summary of each processed discovery. The judge writes event data via events_write; the workflow uses this summary to stamp handled discoveries and gate trigger_investigation.'
            items:
              type: object
              properties:
                event_id:
                  type: string
                  description: 'Echo the event_id verbatim from the input discovery. Also returned by events_write. Required for trigger_investigation context.'
                event_uuid:
                  type: string
                  description: 'UUID assigned by events_write. Required for trigger_investigation context.'
                severity:
                  type: string
                  enum: ['80-critical', '60-high', '40-medium', '20-low']
                  description: 'Severity of the event as decided by the judge.'
                status:
                  type: string
                  enum: [open, dismissed, closed]
                  description: 'Status decision.'
                written:
                  type: boolean
                  description: 'true when events_write appended the event version.'
              required: [event_id, event_uuid, severity, status, written]
        required: [significant_events]
    on-failure:
      continue: false

  # -----------------------------------------------------------------------
  # Step 5: Stamp successfully written discoveries as handled, then trigger
  # root-cause investigation for newly-opened high-severity events.
  # The judge owns the event decision and events_write; deterministic queue
  # advancement stays in the workflow and does not consume agent turns.
  # -----------------------------------------------------------------------

  # Eviction-safe snapshot — ai.agent outputs are evictable; data.set outputs are not.
  - name: check_judge_agent_output
    type: if
    condition: '${{ steps.run_judge_agent.error == null and steps.run_judge_agent.output.structured_output.significant_events != null }}'
    steps:
      - name: store_significant_events
        type: data.set
        with:
          significant_events: '${{ steps.run_judge_agent.output.structured_output.significant_events }}'

      - name: compute_written_event_ids
        type: data.set
        with:
          written_event_ids: >-
            ${{
              steps.store_significant_events.output.significant_events
                | default: []
                | reject: 'written', false
                | map: 'event_id'
                | compact
                | uniq }}

      - name: foreach_stamp_handled
        type: foreach
        foreach: '${{ steps.collect_discoveries.output.findings }}'
        iteration-on-failure:
          continue: true
        steps:
          - name: check_event_written
            type: if
            condition: '${{ variables.written_event_ids contains foreach.item.event_id }}'
            steps:
              # A newer handled marker already covers this discovery version.
              - name: check_handled_exists
                type: elasticsearch.request
                with:
                  method: POST
                  path: '/{{ consts.DISCOVERIES_INDEX }}/_count?ignore_unavailable=true'
                  body:
                    query:
                      bool:
                        filter:
                          - term:
                              kibana.space_ids: '{{ variables.spaceId }}'
                          - term:
                              event_id: '{{ foreach.item.event_id }}'
                          - term:
                              kind: '{{ consts.KIND_HANDLED }}'
                          - range:
                              '@timestamp':
                                gte: '{{ foreach.item["@timestamp"] }}'
                on-failure:
                  continue: true

              - name: write_handled_marker
                if: '${{ steps.check_handled_exists.output.count == 0 }}'
                type: elasticsearch.request
                with:
                  method: POST
                  path: '/{{ consts.DISCOVERIES_INDEX }}/_doc'
                  body:
                    '@timestamp': '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
                    kibana:
                      space_ids:
                        - '{{ variables.spaceId }}'
                    kind: '{{ consts.KIND_HANDLED }}'
                    event_id: '{{ foreach.item.event_id }}'
                    previous_discovery_id: '{{ foreach.item.discovery_id }}'
                on-failure:
                  continue: true

      # Size must be computed in a separate step — comparison operators cannot follow
      # a filter chain in the same expression (see compute_queue_sizes above).
      - name: count_open_events
        type: data.set
        with:
          openCount: >-
            ${{ steps.store_significant_events.output.significant_events
              | default: []
              | where: 'status', 'open'
              | reject: 'written', false
              | size
              | default: 0 }}

      - name: foreach_significant_event
        type: foreach
        if: '${{ steps.count_open_events.output.openCount > 0 }}'
        foreach: >-
          ${{
            steps.store_significant_events.output.significant_events
              | default: []
              | where: 'status', 'open'
              | reject: 'written', false
              | default: [] }}
        iteration-on-failure:
          continue: true
        steps:
          - name: gate_investigatable_severity
            type: if
            condition: '${{ consts.INVESTIGATABLE_SEVERITIES contains foreach.item.severity }}'
            steps:
              # Look up the full discovery finding for this open event so trigger_investigation
              # below can build the `message` the investigation workflow requires. The judge's
              # structured output only echoes event_id/event_uuid/status/written; the finding's
              # title/summary/symptom_hypothesis/stream_names still live in collect_discoveries' output.
              - name: resolve_open_event
                type: data.set
                with:
                  finding: >-
                    ${{ steps.collect_discoveries.output.findings
                      | where: 'event_id', foreach.item.event_id
                      | first }}

              # Fire-and-forget a root-cause investigation for each newly-opened event.
              # Async so triage (30m) never blocks on the investigation (60m).
              # concurrency_key per event_id ensures a re-opened event cancels the prior
              # in-progress investigation rather than queuing alongside it.
              - name: trigger_investigation
                type: workflow.executeAsync
                with:
                  workflow-id: 'system-significant-events-investigation'
                  inputs:
                    message: |
                      {{ steps.resolve_open_event.output.finding.title }}

                      {{ steps.resolve_open_event.output.finding.summary }}

                      Probable cause: {{ steps.resolve_open_event.output.finding.symptom_hypothesis }}
                    stream_names: '${{ steps.resolve_open_event.output.finding.stream_names | default: [] }}'
                    concurrency_key: '{{ foreach.item.event_id }}'
                    context:
                      source: 'significant_event'
                      event_uuid: '{{ foreach.item.event_uuid }}'
                      event_id: '{{ foreach.item.event_id }}'
                      status: '{{ foreach.item.status }}'

  - name: output_result
    type: workflow.output
    with:
      candidateCount: '${{ steps.compute_queue_stats.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_stats.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_stats.output.remainingCount }}'
      hasRemaining: '${{ steps.compute_queue_stats.output.hasRemaining }}'
      queueEmpty: '${{ steps.compute_queue_stats.output.queueEmpty }}'
      noWork: false
