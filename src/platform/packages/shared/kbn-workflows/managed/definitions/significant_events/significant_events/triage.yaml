version: '1'
name: 'Significant Events Triage'
description: 'Analyses unreviewed discoveries with a judge agent and creates significant events.'
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - triage
settings:
  timeout: '30m'
  concurrency:
    key: significant-events-triage
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: discoveryLookback
        type: string
        default: 'now-7d'
        required: false
        description: 'Lookback window for active discoveries. Should match .significant_events-discoveries retention.'
      - name: discoveryBatchMax
        type: number
        default: 10
        required: false
        description: 'Max discoveries per judge invocation. Caps agent message size; remaining discoveries are picked up on the next cycle.'

outputs:
  - name: processedCount
    type: number
  - name: hasWork
    type: boolean

consts:
  DISCOVERIES_INDEX: '.significant_events-discoveries'
  EVENTS_INDEX: '.significant_events-events'
  KIND_DISCOVERY: 'discovery'
  KIND_HANDLED: 'handled'
  INVESTIGATABLE_SEVERITIES: ['80-critical', '60-high']
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_space_vars
    type: data.set
    with:
      spaceId: '{{ workflow.spaceId }}'

  # Select the latest real state per event (_id tie-break). Only events whose latest
  # state is discovery remain eligible. Score by severity + age of that discovery doc.
  - name: get_unassessed_discoveries
    type: elasticsearch.esql.query
    with:
      query: |-
        FROM .significant_events-discoveries METADATA _id, _source
        | INLINE STATS latest_timestamp = MAX(@timestamp) BY event_id
        | WHERE @timestamp == latest_timestamp
        | INLINE STATS latest_id = MAX(_id) BY event_id
        | WHERE _id == latest_id AND kind == "discovery"
        | EVAL severity_score = CASE(severity == "80-critical", 80, severity == "60-high", 60, severity == "40-medium", 40, severity == "20-low", 20, 0)
        | EVAL staleness_minutes = DATE_DIFF("minute", @timestamp, NOW())
        | EVAL score = severity_score + staleness_minutes
        | SORT score DESC, @timestamp ASC, _id ASC
        | LIMIT ?1
        | KEEP event_id, _source, score
      params:
        - '${{ inputs.discoveryBatchMax }}'
      filter:
        bool:
          filter:
            - term:
                kibana.space_ids: '{{ variables.spaceId }}'
            - range:
                '@timestamp':
                  gte: '{{ inputs.discoveryLookback }}'
    on-failure:
      continue: true

  # NOTE: cross-step references chaining a `.size` property accessor (e.g.
  # `steps.x.output.findings.size`) resolve to undefined once referenced from
  # the 3rd+ step of the workflow — an engine quirk with the dot-notation size
  # getter. The `| size` filter does not have this issue, but filter chains
  # cannot be followed by comparison operators in the same expression, so raw
  # sizes are computed here and hasWork is derived in a separate step below.
  - name: compute_batch_size
    type: data.set
    with:
      processedCount: '${{ steps.get_unassessed_discoveries.output.values | size | default: 0 }}'

  - name: compute_has_work
    type: data.set
    with:
      hasWork: '${{ steps.compute_batch_size.output.processedCount > 0 }}'

  - name: maybe_exit_no_work
    type: if
    condition: '${{ steps.compute_has_work.output.hasWork == false }}'
    steps:
      - name: output_no_discoveries
        type: workflow.output
        with:
          processedCount: '${{ steps.compute_batch_size.output.processedCount }}'
          hasWork: false

  # -----------------------------------------------------------------------
  # Judge — evaluate unreviewed discoveries.
  # -----------------------------------------------------------------------
  - name: run_judge_agent
    type: ai.agent
    agent-id: "platform.streams.sig-events.discovery-judge"
    # Keep connector-id-by-feature/plugin-id/aggregate-by in sync with @kbn/significant-events-schema
    # inference_feature_ids.ts (SIGNIFICANT_EVENTS_TRIAGE_INFERENCE_FEATURE_ID /
    # SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID). Own feature — judge is a lighter,
    # cheaper classification step than discovery and should default to its own model tier.
    connector-id-by-feature: 'significant_events_triage'
    plugin-id: 'significant_events_triage'
    aggregate-by: 'significant_events'
    create-conversation: true
    with:
      message: |
        ## Unreviewed Discoveries

        Columns: {{ steps.get_unassessed_discoveries.output.columns | map: 'name' | json }}
        Rows: {{ steps.get_unassessed_discoveries.output.values | json }}
      schema:
        type: object
        properties:
          significant_events:
            type: array
            description: 'Compact summary of each processed discovery. The judge writes event data via events_write; the workflow uses this summary to stamp handled discoveries and gate trigger_investigation.'
            items:
              type: object
              properties:
                event_id:
                  type: string
                  description: 'Echo the event_id verbatim from the input discovery. Also returned by events_write. Required for trigger_investigation context.'
                event_uuid:
                  type: string
                  description: 'UUID assigned by events_write. Required for trigger_investigation context.'
                severity:
                  type: string
                  enum: ['80-critical', '60-high', '40-medium', '20-low']
                  description: 'Severity of the event as decided by the judge.'
                status:
                  type: string
                  enum: [open, dismissed, closed]
                  description: 'Status decision.'
                written:
                  type: boolean
                  description: 'true when events_write appended the event version.'
              required: [event_id, event_uuid, severity, status, written]
        required: [significant_events]
    on-failure:
      continue: false

  # -----------------------------------------------------------------------
  # Stamp successfully written discoveries as handled, then trigger
  # root-cause investigation for newly-opened high-severity events.
  # The judge owns the event decision and events_write; deterministic queue
  # advancement stays in the workflow and does not consume agent turns.
  # -----------------------------------------------------------------------

  # Eviction-safe snapshot — ai.agent outputs are evictable; data.set outputs are not.
  - name: check_judge_agent_output
    type: if
    condition: '${{ steps.run_judge_agent.error == null and steps.run_judge_agent.output.structured_output.significant_events != null }}'
    steps:
      - name: store_significant_events
        type: data.set
        with:
          significant_events: '${{ steps.run_judge_agent.output.structured_output.significant_events }}'

      - name: compute_written_event_ids
        type: data.set
        with:
          written_event_ids: >-
            ${{
              steps.store_significant_events.output.significant_events
                | default: []
                | reject: 'written', false
                | map: 'event_id'
                | compact
                | uniq }}

      # ES|QL rows are [event_id, _source, score].
      - name: foreach_stamp_handled
        type: foreach
        foreach: '${{ steps.get_unassessed_discoveries.output.values | default: [] }}'
        iteration-on-failure:
          continue: true
        steps:
          - name: check_event_written
            type: if
            condition: '${{ variables.written_event_ids contains foreach.item[0] }}'
            steps:
              # A newer handled marker already covers this discovery version.
              - name: check_handled_exists
                type: elasticsearch.request
                with:
                  method: POST
                  path: '/{{ consts.DISCOVERIES_INDEX }}/_count?ignore_unavailable=true'
                  body:
                    query:
                      bool:
                        filter:
                          - term:
                              kibana.space_ids: '{{ variables.spaceId }}'
                          - term:
                              event_id: '{{ foreach.item[0] }}'
                          - term:
                              kind: '{{ consts.KIND_HANDLED }}'
                          - range:
                              '@timestamp':
                                gte: '{{ foreach.item[1]["@timestamp"] }}'
                on-failure:
                  continue: true

              - name: maybe_write_handled_marker
                type: if
                condition: '${{ steps.check_handled_exists.output.count == 0 }}'
                steps:
                  - name: write_handled_marker
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: '/{{ consts.DISCOVERIES_INDEX }}/_doc'
                      body:
                        '@timestamp': '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
                        kibana:
                          space_ids:
                            - '{{ variables.spaceId }}'
                        kind: '{{ consts.KIND_HANDLED }}'
                        event_id: '{{ foreach.item[0] }}'
                        previous_discovery_id: '{{ foreach.item[1].discovery_id }}'
                    on-failure:
                      continue: true

      # Size must be computed in a separate step — comparison operators cannot follow
      # a filter chain in the same expression (see compute_batch_size above).
      - name: count_open_events
        type: data.set
        with:
          openCount: >-
            ${{ steps.store_significant_events.output.significant_events
              | default: []
              | where: 'status', 'open'
              | reject: 'written', false
              | size
              | default: 0 }}

      - name: maybe_trigger_investigations
        type: if
        condition: '${{ steps.count_open_events.output.openCount > 0 }}'
        steps:
          - name: foreach_significant_event
            type: foreach
            foreach: >-
              ${{
                steps.store_significant_events.output.significant_events
                  | default: []
                  | where: 'status', 'open'
                  | reject: 'written', false
                  | default: [] }}
            iteration-on-failure:
              continue: true
            steps:
              - name: gate_investigatable_severity
                type: if
                condition: '${{ consts.INVESTIGATABLE_SEVERITIES contains foreach.item.severity }}'
                steps:
                  # ES|QL rows are [event_id, _source, score]; pull the matching _source for the message.
                  - name: resolve_open_event
                    type: data.set
                    with:
                      finding: >-
                        ${{ steps.get_unassessed_discoveries.output.values
                          | default: []
                          | where: '0', foreach.item.event_id
                          | map: '1'
                          | first }}

                  # Skip events that already have an investigation attached. events_write carries
                  # the investigations lineage forward on re-open, so any version of the event_id
                  # that carries an investigations entry means this episode was already investigated.
                  # The field is a mapped object, so an `exists` filter matches only versions that
                  # actually carry an entry (an empty investigations array does not count).
                  - name: check_prior_investigation
                    type: elasticsearch.request
                    with:
                      method: POST
                      path: '/{{ consts.EVENTS_INDEX }}/_count?ignore_unavailable=true'
                      body:
                        query:
                          bool:
                            filter:
                              - term:
                                  kibana.space_ids: '{{ variables.spaceId }}'
                              - term:
                                  event_id: '{{ foreach.item.event_id }}'
                              - exists:
                                  field: investigations
                    on-failure:
                      continue: true

                  # Fire-and-forget a root-cause investigation for each newly-opened event that
                  # has not been investigated before. Async so triage (30m) never blocks on the
                  # investigation (60m). concurrency_key per event_id ensures a re-opened event
                  # cancels the prior in-progress investigation rather than queuing alongside it
                  # (cancel-in-progress / max:1 in the investigation workflow).
                  # The dedupe gate lives on this wrapping `if` step because `workflow.executeAsync`
                  # does not support an inline `if` (it is silently stripped during schema parsing).
                  # On lookup failure we fall through and still trigger, preserving prior behaviour.
                  - name: guard_missing_investigation
                    type: if
                    condition: >-
                      ${{ steps.check_prior_investigation.error != null
                        or steps.check_prior_investigation.output.count == 0 }}
                    steps:
                      - name: trigger_investigation
                        type: workflow.executeAsync
                        with:
                          workflow-id: 'system-significant-events-investigation'
                          inputs:
                            message: |
                              {{ steps.resolve_open_event.output.finding.title }}

                              {{ steps.resolve_open_event.output.finding.summary }}

                              Probable cause: {{ steps.resolve_open_event.output.finding.symptom_hypothesis }}
                            stream_names: '${{ steps.resolve_open_event.output.finding.stream_names | default: [] }}'
                            concurrency_key: '{{ foreach.item.event_id }}'
                            context:
                              source: 'significant_event'
                              event_uuid: '{{ foreach.item.event_uuid }}'
                              event_id: '{{ foreach.item.event_id }}'
                              status: '{{ foreach.item.status }}'

  - name: output_result
    type: workflow.output
    with:
      processedCount: '${{ steps.compute_batch_size.output.processedCount }}'
      hasWork: true
