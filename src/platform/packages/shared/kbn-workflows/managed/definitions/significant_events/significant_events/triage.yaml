version: '1'
name: 'Significant Events Triage'
description: 'Analyses unreviewed discoveries with a judge agent and creates significant events.'
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - triage
settings:
  timeout: '30m'
  concurrency:
    key: significant-events-triage
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: discoveryLookback
        type: string
        default: 'now-7d'
        required: false
        description: 'Lookback window for active discoveries. Should match .significant_events-discoveries retention.'
      - name: discoveryBatchMax
        type: number
        default: 10
        required: false
        description: 'Max discoveries per judge invocation. Caps agent message size; remaining discoveries are picked up on the next cycle.'

outputs:
  - name: candidateCount
    type: number
  - name: processedCount
    type: number
  - name: remainingCount
    type: number
  - name: hasRemaining
    type: boolean
  - name: queueEmpty
    type: boolean
  - name: noWork
    type: boolean

consts:
  DISCOVERIES_INDEX: '.significant_events-discoveries'
  EVENTS_INDEX: '.significant_events-events'
  KIND_DISCOVERY: 'discovery'
  KIND_HANDLED: 'handled'
  SCAN_BATCH_SIZE: 100
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_space_vars
    type: data.set
    with:
      spaceId: '{{ workflow.spaceId }}'

  # -----------------------------------------------------------------------
  # Step 1: Fetch unassessed discoveries — latest doc per slug. Scan SCAN_BATCH_SIZE to avoid
  # kind:handled docs (newer timestamps) crowding out unprocessed slugs in the size cap; handled
  # slugs are filtered out in collect_discoveries and the result is capped there.
  # -----------------------------------------------------------------------
  - name: get_unassessed_discoveries
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DISCOVERIES_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: '${{ consts.SCAN_BATCH_SIZE }}'
        sort:
          - '@timestamp':
              order: desc
          - criticality:
              order: desc
              missing: '_last'
              unmapped_type: integer
        collapse:
          field: discovery_slug
        _source:
          includes:
            - kind
            - discovery_id
            - discovery_slug
            - title
            - summary
            - root_cause
            - criticality
            - confidence
            - cause_kis
            - evidences
            - detections
            - dependency_edges
            - infra_components
            - stream_names
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: '{{ variables.spaceId }}'
              - range:
                  '@timestamp':
                    gte: '{{ inputs.discoveryLookback }}'
    on-failure:
      continue: true

  # -----------------------------------------------------------------------
  # Step 2: Filter to only unassessed slugs (latest doc is a discovery, not handled).
  # -----------------------------------------------------------------------
  - name: collect_discovery_candidates
    type: data.set
    with:
      findings: >-
        ${{ steps.get_unassessed_discoveries.output.hits.hits
          | map: '_source'
          | reject: 'kind', 'handled'
          | default: [] }}

  - name: collect_discoveries
    type: data.set
    with:
      findings: >-
        ${{ steps.collect_discovery_candidates.output.findings
          | slice: 0, inputs.discoveryBatchMax
          | default: [] }}

  # NOTE: cross-step references chaining a `.size` property accessor (e.g.
  # `steps.x.output.findings.size`) resolve to undefined once referenced from
  # the 3rd+ step of the workflow — an engine quirk with the dot-notation size
  # getter. The `| size` filter does not have this issue, but filter chains
  # cannot be followed by comparison operators in the same expression, so raw
  # sizes are computed here and derived stats are computed from those (plain
  # number) outputs in a separate step below.
  - name: compute_queue_sizes
    type: data.set
    with:
      candidateCount: '${{ steps.collect_discovery_candidates.output.findings | size | default: 0 }}'
      processedCount: '${{ steps.collect_discoveries.output.findings | size | default: 0 }}'

  - name: compute_queue_stats
    type: data.set
    with:
      candidateCount: '${{ steps.compute_queue_sizes.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_sizes.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_sizes.output.candidateCount | minus: steps.compute_queue_sizes.output.processedCount | at_least: 0 }}'
      hasRemaining: '${{ steps.compute_queue_sizes.output.candidateCount > steps.compute_queue_sizes.output.processedCount }}'
      queueEmpty: '${{ steps.compute_queue_sizes.output.candidateCount <= steps.compute_queue_sizes.output.processedCount }}'

  # -----------------------------------------------------------------------
  # Step 3: Exit early when there is nothing to triage.
  # -----------------------------------------------------------------------
  - name: output_no_discoveries
    type: workflow.output
    if: '${{ steps.compute_queue_sizes.output.processedCount == 0 }}'
    with:
      candidateCount: '${{ steps.compute_queue_stats.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_stats.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_stats.output.remainingCount }}'
      hasRemaining: '${{ steps.compute_queue_stats.output.hasRemaining }}'
      queueEmpty: '${{ steps.compute_queue_stats.output.queueEmpty }}'
      noWork: true

  # -----------------------------------------------------------------------
  # Step 4: Judge — evaluate unreviewed discoveries.
  # -----------------------------------------------------------------------
  - name: run_judge_agent
    type: ai.agent
    agent-id: "platform.streams.sig-events.discovery-judge"
    # Keep connector-id-by-feature/plugin-id/aggregate-by in sync with @kbn/significant-events-schema
    # inference_feature_ids.ts (SIGNIFICANT_EVENTS_TRIAGE_INFERENCE_FEATURE_ID /
    # SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID). Own feature — judge is a lighter,
    # cheaper classification step than discovery and should default to its own model tier.
    connector-id-by-feature: 'significant_events_triage'
    plugin-id: 'significant_events_triage'
    aggregate-by: 'significant_events'
    create-conversation: true
    with:
      message: |
        ## Unreviewed Discoveries

        {{ steps.collect_discoveries.output.findings | json }}
      schema:
        type: object
        properties:
          significant_events:
            type: array
            description: 'Compact summary of each processed discovery — used by the workflow to gate trigger_investigation. Full event data is written by the judge via events_write and discovery_write tools.'
            items:
              type: object
              properties:
                discovery_slug:
                  type: string
                  description: 'Echo verbatim from the input discovery.'
                event_id:
                  type: string
                  description: 'event_id returned by events_write. Required for trigger_investigation context.'
                status:
                  type: string
                  enum: [promoted, acknowledged, demoted, resolved]
                  description: 'Status decision.'
                written:
                  type: boolean
                  description: 'true when events_write appended the event version.'
              required: [discovery_slug, status, written]
        required: [significant_events]
    on-failure:
      continue: false

  # -----------------------------------------------------------------------
  # Step 5: Trigger root-cause investigation for newly-promoted events.
  # The judge writes events (events_write) and stamps discoveries
  # (discovery_write kind:handled) directly via tools. The workflow only
  # needs to fire the async investigation for promoted events.
  # -----------------------------------------------------------------------

  # Eviction-safe snapshot — ai.agent outputs are evictable; data.set outputs are not.
  - name: check_judge_agent_output
    type: if
    condition: '${{ steps.run_judge_agent.error == null and steps.run_judge_agent.output.structured_output.significant_events != null }}'
    steps:
      - name: store_significant_events
        type: data.set
        with:
          significant_events: '${{ steps.run_judge_agent.output.structured_output.significant_events }}'

  - name: foreach_significant_event
    type: foreach
    if: >-
      ${{ steps.store_significant_events.output != null
      and steps.store_significant_events.output.significant_events != null }}
    foreach: '${{ steps.store_significant_events.output.significant_events }}'
    steps:
      # Look up the full discovery finding for this promoted event so trigger_investigation
      # below can build the `message` the investigation workflow requires. The judge's
      # structured output only echoes discovery_slug/event_id/status/written; the finding's
      # title/summary/root_cause/stream_names still live in collect_discoveries' output.
      - name: resolve_promoted_finding
        type: data.set
        if: '${{ foreach.item.status == "promoted" and foreach.item.written }}'
        with:
          finding: >-
            ${{ steps.collect_discoveries.output.findings
              | where: 'discovery_slug', foreach.item.discovery_slug
              | first
              | default: {} }}

      # Fire-and-forget a root-cause investigation for each newly-promoted event.
      # Async so triage (30m) never blocks on the investigation (60m).
      # concurrency_key per slug ensures a re-promotion cancels the prior in-progress
      # investigation rather than queuing alongside it (cancel-in-progress / max:1 in the
      # investigation workflow).
      - name: trigger_investigation
        type: workflow.executeAsync
        if: '${{ foreach.item.status == "promoted" and foreach.item.written }}'
        with:
          workflow-id: 'system-significant-events-investigation'
          inputs:
            message: |
              {{ steps.resolve_promoted_finding.output.finding.title }}

              {{ steps.resolve_promoted_finding.output.finding.summary }}

              Probable cause: {{ steps.resolve_promoted_finding.output.finding.root_cause }}
            stream_names: '${{ steps.resolve_promoted_finding.output.finding.stream_names | default: [] }}'
            concurrency_key: '{{ foreach.item.discovery_slug }}'
            context:
              source: 'significant_event'
              event_id: '{{ foreach.item.event_id }}'
              discovery_slug: '{{ foreach.item.discovery_slug }}'
              status: '{{ foreach.item.status }}'
        on-failure:
          continue: true

  - name: output_result
    type: workflow.output
    with:
      candidateCount: '${{ steps.compute_queue_stats.output.candidateCount }}'
      processedCount: '${{ steps.compute_queue_stats.output.processedCount }}'
      remainingCount: '${{ steps.compute_queue_stats.output.remainingCount }}'
      hasRemaining: '${{ steps.compute_queue_stats.output.hasRemaining }}'
      queueEmpty: '${{ steps.compute_queue_stats.output.queueEmpty }}'
      noWork: false
