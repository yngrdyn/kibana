version: "1"
name: "Significant Events Detection"
description: "Detects statistically significant changes in alert firing patterns per rule using the Elasticsearch change_point aggregation. Writes an immutable change-point detection per rule on transition; lifecycle (recovered/quiet) is NOT determined here — it is read from the alerts by the discovery flow."
enabled: true
tags:
  - observability
  - streams
  - significant-events
  - detection
settings:
  timeout: "10m"
  concurrency:
    key: significant-events-detection
    strategy: drop
    max: 1
triggers:
  - type: manual
    inputs:
      - name: lookback
        type: string
        default: "now-40m"
        required: false
        description: "Time window start for the change_point aggregation (ES date math, e.g. now-40m). Must give the change_point agg >= 22 buckets at the configured bucketInterval and be wide enough for a drop-to-silence to stand out (~40m at 1m buckets => ~41 buckets)."
      - name: bucketInterval
        type: string
        default: "1m"
        required: false
        description: "Fixed interval for the date_histogram bucketing inside change_point. Must be >= the rule's alert emission cadence — a finer interval leaves alternate buckets empty, producing a 0/N sawtooth whose variance masks real drops (a recovery then misreads as `stationary`)."
      - name: detectionIntervalMinutes
        type: number
        default: 10
        required: false
        description: "How often the scheduled detection runs (minutes). Used together with targetCoverageMinutes to size the per-run scan batch. The scheduler overrides this at run time; the default here applies only to manual/standalone invocations."
      - name: targetCoverageMinutes
        type: number
        default: 10
        required: false
        description: "Every active rule must be scanned at least once within this many minutes. scan_cycles = floor(targetCoverageMinutes / detectionIntervalMinutes), min 1. Round-robin spreads the fleet only when targetCoverageMinutes > detectionIntervalMinutes; equal or less scans the whole fleet each run. The scheduler overrides this at run time; the default here (equal to detectionIntervalMinutes) scans the whole fleet on a manual/standalone run."
consts:
  DETECTIONS_INDEX: ".significant_events-detections"
  # Window used to look up a rule's most recent change-point detection when deciding whether the
  # currently observed change_point_type is a transition. Must comfortably exceed the scan
  # cadence so the prior detection is still visible.
  LAST_DETECTION_LOOKBACK: "now-24h"
  # Window used by the recency agg to find when each rule was last scanned (detection or bare touch
  # marker). Mirrors LAST_DETECTION_LOOKBACK so a just-scanned rule is never miscounted as
  # never-scanned within a realistic coverage cycle.
  SCAN_RECENCY_WINDOW: "now-24h"
  # Max buckets returned by the recency agg; must be >= max active rules per space.
  SCAN_RECENCY_AGG_SIZE: 1000
  # Sentinel so a terms clause over active rule UUIDs is never empty (ES rejects an empty terms
  # value with a parsing_exception). Mirrors discovery.yaml's NO_MATCH_IDS pattern.
  NO_MATCH_UUIDS: ['__no_active_rule__']
steps:
  # Copy workflow.spaceId into variables so ES body Liquid expressions can reference it.
  - name: set_init_vars
    type: data.set
    with:
      spaceId: "{{ workflow.spaceId }}"
  # -----------------------------------------------------------------------
  # Pre-pass: early exit on idle spaces — one cheap count skips the expensive scan when there are
  # no alerts (per-space scheduled workflow; many spaces may be idle). With no alert docs the
  # change_point scan produces no buckets, so there is nothing to write.
  # -----------------------------------------------------------------------
  - name: count_alerts_in_lookback
    type: kibana.request
    with:
      method: POST
      path: "/s/{{ variables.spaceId }}/internal/significant_events/detections/workflow/_count_alerts"
      headers:
        x-elastic-internal-origin: "kibana"
      body:
        lookback: '{{ inputs.lookback }}'
    on-failure:
      continue: true

  - name: compute_idle_counts
    type: data.set
    with:
      alerts_count: "${{ steps.count_alerts_in_lookback.output.count | default: 1 }}"

  - name: exit_no_active_alerts
    type: workflow.output
    if: "${{ steps.compute_idle_counts.output.alerts_count == 0 }}"
    status: cancelled
    with:
      reason: "No recent alerts — change point scan skipped"

  # -----------------------------------------------------------------------
  # Step 1: Per-rule change_point over the main lookback.
  # -----------------------------------------------------------------------
  - name: run_change_point_aggregation
    type: kibana.request
    with:
      method: POST
      path: "/s/{{ variables.spaceId }}/internal/significant_events/detections/workflow/_change_point_scan"
      headers:
        x-elastic-internal-origin: "kibana"
      body:
        lookback: '{{ inputs.lookback }}'
        bucketInterval: '{{ inputs.bucketInterval }}'

  # -----------------------------------------------------------------------
  # Step 2: Build the round-robin batch — select the stalest subset of active rules so that
  # every rule with activity is evaluated within targetCoverageMinutes regardless of how
  # noisy its neighbours are.
  #
  # Design overview:
  #   - active_rule_uuids: all rule keys from the change-point agg (with NO_MATCH_UUIDS sentinel).
  #   - get_scan_recency: terms agg on rule_uuid, ordered stalest-first, max(@timestamp) sub-agg,
  #     NO `exists: change_point_type` filter so bare touch markers count as "recently scanned".
  #   - scanned_uuids: rules that appear in the recency window (already stalest-first).
  #   - never_scanned_uuids: active rules absent from the recency agg (set-difference via reject_exp).
  #   - scan_cycles: floor(targetCoverageMinutes / detectionIntervalMinutes), min 1.
  #   - scan_batch_size: ceil(active / scan_cycles) via integer-division emulation, min 1.
  #   - batch_rule_uuids: never_scanned first, then stalest previously-scanned, sliced to batch_size.
  # -----------------------------------------------------------------------
  - name: compute_active_rule_uuids
    type: data.set
    with:
      # With sentinel — used in the recency agg terms filter (never-empty terms clause).
      active_rule_uuids: "${{ steps.run_change_point_aggregation.output.aggregations.by_rule.buckets | map: 'key' | compact | uniq | concat: consts.NO_MATCH_UUIDS }}"
      # Without sentinel — real rule keys used for priority/batch math.
      active_rule_keys: "${{ steps.run_change_point_aggregation.output.aggregations.by_rule.buckets | map: 'key' | compact | uniq }}"
      active_rule_count: "${{ steps.run_change_point_aggregation.output.aggregations.by_rule.buckets | map: 'key' | compact | uniq | size | default: 0 }}"

  - name: get_scan_recency
    # Fetch when each active rule was last scanned (detection or bare touch marker).
    # No `exists: change_point_type` filter — bare markers must count.
    # terms agg ordered ascending by last_touched so the result is already stalest-first.
    type: elasticsearch.request
    with:
      method: POST
      path: '/{{ consts.DETECTIONS_INDEX }}/_search?ignore_unavailable=true'
      body:
        size: 0
        query:
          bool:
            filter:
              - term:
                  kibana.space_ids: "{{ variables.spaceId }}"
              - terms:
                  rule_uuid: "${{ variables.active_rule_uuids }}"
              - range:
                  "@timestamp":
                    gte: '{{ consts.SCAN_RECENCY_WINDOW }}'
        aggregations:
          by_rule:
            terms:
              field: rule_uuid
              size: "${{ consts.SCAN_RECENCY_AGG_SIZE }}"
              order:
                last_touched: asc
            aggregations:
              last_touched:
                max:
                  field: "@timestamp"
    on-failure:
      continue: true

  - name: compute_scan_recency_keys
    # Rule UUIDs that appear in the recency window, already stalest-first from the agg ordering.
    type: data.set
    with:
      scanned_uuids: "${{ steps.get_scan_recency.output.aggregations.by_rule.buckets | default: [] | map: 'key' }}"

  - name: compute_scan_priority
    # Rules with no doc in the recency window have never been scanned — they go first.
    # reject_exp performs a set-difference: keep active keys absent from scanned_uuids.
    type: data.set
    with:
      never_scanned_uuids: "${{ variables.active_rule_keys | reject_exp: 'uuid', 'variables.scanned_uuids contains uuid' }}"

  - name: compute_scan_cycles
    # Number of detection runs needed to cover the full fleet once.
    # Integer division floors naturally; at_least: 1 avoids divide-by-zero when
    # detectionIntervalMinutes >= targetCoverageMinutes.
    type: data.set
    with:
      scan_cycles: "${{ inputs.targetCoverageMinutes | divided_by: inputs.detectionIntervalMinutes | at_least: 1 }}"

  - name: compute_scan_batch_size
    # ceil(active_rule_count / scan_cycles) via the integer-division identity:
    # ceil(a / b) == floor((a + b - 1) / b).
    # LiquidJS divided_by floors automatically for integer operands.
    # at_least: 1 ensures we always process at least one rule.
    type: data.set
    with:
      scan_batch_size: "${{ variables.active_rule_count | plus: variables.scan_cycles | minus: 1 | divided_by: variables.scan_cycles | at_least: 1 }}"

  - name: compute_scan_batch
    # Never-scanned rules first (highest priority), then stalest previously-scanned, truncated
    # to scan_batch_size. The recency agg already ordered previously-scanned stalest-first.
    type: data.set
    with:
      batch_rule_uuids: "${{ variables.never_scanned_uuids | concat: variables.scanned_uuids | slice: 0, variables.scan_batch_size }}"

  # -----------------------------------------------------------------------
  # Step 3: Foreach rule bucket — observe the change_point type and write a DETECTION on transition.
  # A detection is an immutable observation of a non-stationary change_point_type (`stationary` is
  # ambient noise and is never written). We write exactly one detection when the observed type
  # differs from that rule's most recent detection — no lifecycle determination, no per-scan firehose.
  # Out-of-batch rules skip both the lookup and the write via has_rule_uuid.
  # -----------------------------------------------------------------------
  - name: foreach_rule
    type: foreach
    if: "${{ steps.run_change_point_aggregation.output.aggregations.by_rule.buckets != null }}"
    foreach: "${{ steps.run_change_point_aggregation.output.aggregations.by_rule.buckets }}"
    steps:
      - name: compute_rule_context
        # change_point_type computed once — the single key of the change_points.type object.
        # has_rule_uuid guards all downstream steps: non-empty UUID AND in the current batch.
        # Out-of-batch rules produce has_rule_uuid=false and skip the lookup and both writes.
        type: data.set
        with:
          change_point_type: "${{ foreach.item.change_points.type | entries | map: 'key' | first | default: '' }}"
          has_rule_uuid: "${{ foreach.item.key != null and foreach.item.key != '' and variables.batch_rule_uuids contains foreach.item.key }}"

      - name: check_last_detection
        # Most recent DETECTION for this rule (detections carry change_point_type; processed markers do not,
        # so `exists: change_point_type` excludes markers). Used to decide whether the observed
        # type is a transition.
        if: "${{ steps.compute_rule_context.output.has_rule_uuid }}"
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.DETECTIONS_INDEX }}/_search?ignore_unavailable=true'
          body:
            size: 1
            sort:
              - "@timestamp":
                  order: desc
            query:
              bool:
                filter:
                  - term:
                      kibana.space_ids: "{{ variables.spaceId }}"
                  - term:
                      rule_uuid: "{{ foreach.item.key }}"
                  - exists:
                      field: change_point_type
                  - range:
                      "@timestamp":
                        gte: '{{ consts.LAST_DETECTION_LOOKBACK }}'
        on-failure:
          continue: true

      - name: compute_transition
        type: data.set
        with:
          # "" when the rule has no prior detection in the window; any observed type then reads as a
          # transition (first observation for the rule).
          last_change_point_type: "{% if steps.check_last_detection.output.hits.total.value > 0 %}{{ steps.check_last_detection.output.hits.hits[0]._source.change_point_type | default: '' }}{% else %}{% endif %}"
          detection_p_value: "${{ foreach.item.change_points.type[steps.compute_rule_context.output.change_point_type].p_value | default: 0 }}"

      - name: compute_write_gate
        type: data.set
        with:
          # Write only when the observed change_point_type differs from the rule's last detection.
          # A transient lookup error (check_last_detection runs on-failure:continue) must not force a
          # write, so require error == null.
          # `stationary` (flat alert rate) is overwhelmingly ambient noise and is never written;
          # post-escalation recovery is handled by the judge's re-evaluation queries instead.
          is_transition: >-
            ${{ steps.compute_rule_context.output.has_rule_uuid
            and steps.check_last_detection.error == null
            and steps.compute_rule_context.output.change_point_type != ''
            and steps.compute_rule_context.output.change_point_type != 'stationary'
            and steps.compute_rule_context.output.change_point_type != steps.compute_transition.output.last_change_point_type }}

      - name: write_detection
        # One immutable detection per transition. detection_id is minted fresh for every detection
        # ({rule}-{execution}); latest-per-rule reads regroup by rule_uuid. No lifecycle fields
        # and no cross-pipeline handoff fields — change_point_type/p_value are top-level.
        if: "${{ steps.compute_write_gate.output.is_transition }}"
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.DETECTIONS_INDEX }}/_doc'
          body:
            "@timestamp": '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - "{{ variables.spaceId }}"
            detection_id: "{{ foreach.item.key }}-{{ execution.id }}"
            rule_uuid: "{{ foreach.item.key }}"
            rule_name: "{{ foreach.item.rule_name.top[0].metrics | entries | map: 'value' | first | default: 'unknown' }}"
            stream_name: "{{ foreach.item.stream.buckets[0].key }}"
            change_point_type: "{{ steps.compute_rule_context.output.change_point_type }}"
            p_value: "${{ steps.compute_transition.output.detection_p_value }}"
            alert_index: "{{ steps.run_change_point_aggregation.output.alertIndex }}"
            workflow_execution_id: "{{ execution.id }}"
        on-failure:
          continue: true

      - name: write_scan_marker
        # Bare touch doc written when the rule was in-batch but its change_point_type did NOT
        # transition (write_detection did not fire). This advances the rule's last_touched
        # timestamp in the recency agg so it is not treated as perpetually stale and re-picked
        # every run. Carries no change_point_type so it remains invisible to check_last_detection,
        # discovery's get_detections, and DetectionClient.findLatest (all filter `exists: change_point_type`).
        # When a detection IS written its own @timestamp already advances last_touched — no marker needed.
        # No idempotency guard: foreach_rule visits each rule once per run and markers are
        # intentionally append-per-scan touch records.
        if: "${{ steps.compute_rule_context.output.has_rule_uuid and steps.check_last_detection.error == null and steps.compute_write_gate.output.is_transition == false }}"
        type: elasticsearch.request
        with:
          method: POST
          path: '/{{ consts.DETECTIONS_INDEX }}/_doc'
          body:
            "@timestamp": '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
            kibana:
              space_ids:
                - "{{ variables.spaceId }}"
            rule_uuid: "{{ foreach.item.key }}"
            scanned_by: "{{ execution.id }}"
        on-failure:
          continue: true
