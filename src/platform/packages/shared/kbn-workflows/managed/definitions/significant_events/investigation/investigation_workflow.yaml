version: '1'
name: Investigation
description: >
  Root cause analysis for an observability issue. One agent investigates using
  available signals — logs, traces, metrics, topology, and memory — then
  produces a structured root cause conclusion.
enabled: true
settings:
  timeout: '60m'
  concurrency:
    key: 'significant-events-investigation-{{ inputs.concurrency_key | default: execution.id }}'
    strategy: cancel-in-progress
    max: 1
tags:
  - observability
  - streams
  - significant-events
  - investigation

triggers:
  - type: manual
    inputs:
      properties:
        message:
          type: string
          description: Description of the issue or event to investigate.
        stream_names:
          type: array
          items:
            type: string
          description: Optional data stream names to scope observability queries.
        context:
          type: object
          additionalProperties: true
          description: Optional structured context (e.g. discovery metadata when invoked from sigevents).
        concurrency_key:
          type: string
          description: Optional key for concurrency deduplication. Defaults to the workflow execution ID.
      required:
        - message
      additionalProperties: false

steps:
  # Records a pending investigation on the Significant Event as soon as the workflow starts,
  # so the UI can show an in-progress indicator before the agent step finishes.
  # Only runs when a sig-event context was supplied (triage or chat-agent paths).
  - name: attach_pending_to_significant_event
    type: kibana.request
    if: '${{ inputs.context.event_uuid != null }}'
    with:
      method: POST
      path: '/internal/significant_events/events/{{ inputs.context.event_uuid }}/investigations'
      headers:
        x-elastic-internal-origin: 'kibana'
      body:
        workflow_execution_id: "{{ execution.id }}"
        started_at: '{{ execution.startedAt | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
    on-failure:
      continue: true

  - name: investigate
    type: ai.agent
    agent-id: platform.sig_events.investigation
    # Keep connector-id-by-feature/plugin-id/aggregate-by in sync with @kbn/significant-events-schema
    # inference_feature_ids.ts (SIGNIFICANT_EVENTS_INVESTIGATION_INFERENCE_FEATURE_ID /
    # SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID).
    connector-id-by-feature: 'significant_events_investigation'
    plugin-id: 'significant_events_investigation'
    aggregate-by: 'significant_events'
    create-conversation: true
    with:
      timeout: 1800s
      # Tag the agent execution with the workflow execution id so callers that already know
      # it (e.g. the UI, or the significant event this investigation is attached to) can look
      # up the agent execution's (auto-generated) id via findExecutions and follow its live
      # progress before this step returns.
      metadata:
        workflow_execution_id: "{{ execution.id }}"
      message: |
        Investigate the root cause of the following issue:

        {{ inputs.message }}

        {% if inputs.stream_names and inputs.stream_names.size > 0 %}
        Data streams (use get_index_info to discover available fields in each):
        {% for stream in inputs.stream_names %}- {{ stream }}
        {% endfor %}
        {% endif %}
        {% if inputs.context %}
        Additional context: {{ inputs.context | json }}
        {% endif %}
      # Keep this in sync with investigationStateSchema in @kbn/significant-events-schema
      # (x-pack/platform/packages/shared/kbn-significant-events-schema/src/significant_events/investigation_state.ts)
      # — this is the same schema the investigation_progress_report tool streams live, so the
      # final structured output here must match exactly (including maxLength/maxItems: the UI
      # parses the persisted result with the zod schema and rejects anything over its limits).
      schema:
        type: object
        properties:
          summary:
            type: string
            maxLength: 10000
          hypotheses:
            type: array
            maxItems: 50
            items:
              type: object
              properties:
                candidate:
                  type: string
                  maxLength: 10000
                confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                status:
                  type: string
                  enum: [investigating, dismissed, confirmed]
                reason:
                  type: string
                  maxLength: 10000
              required:
                - candidate
                - confidence
                - status
          conclusion:
            type: string
            maxLength: 10000
          gaps_found:
            type: array
            description: >
              Actionable knowledge gaps discovered during this investigation — data sources that were
              missing or inaccessible and would have helped diagnose the issue. Each item must be a
              concrete, actionable statement of missing data that could reasonably be provided, such as:
              "No traces available for the cart service", "Infrastructure metrics absent for host X",
              "No code repository access for service Y".
              Do NOT include incident-specific observations (e.g. "the pod crashed", "no logs during the
              outage window") — those are incident facts, not actionable knowledge gaps. Reduce the
              finding to what data source is missing and why it matters, not what happened during the incident.
            items:
              type: string
              maxLength: 10000
        required:
          - summary
          - hypotheses
    on-failure:
      continue: true

  # Connects this investigation back to the Significant Event that triggered it, so the
  # UI can surface investigation history and link to the full RCA result. Only runs when
  # a sig-event context was supplied (i.e. the investigation was triggered from triage or
  # from the chat agent for a specific event). Other callers (free-form issues, alerts)
  # that do not supply `inputs.context.event_uuid` are unaffected.
  - name: attach_to_significant_event
    type: kibana.request
    if: '${{ inputs.context.event_uuid != null }}'
    with:
      method: POST
      path: '/internal/significant_events/events/{{ inputs.context.event_uuid }}/investigations'
      headers:
        x-elastic-internal-origin: 'kibana'
      body:
        workflow_execution_id: "{{ execution.id }}"
        started_at: '{{ execution.startedAt | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
        completed_at: '{{ "now" | date: "%Y-%m-%dT%H:%M:%S%:z" }}'
    on-failure:
      continue: true

  # Reconcile the gaps this investigation surfaced into the _gaps/overview memory
  # page. Deliberately minimal: a cheap model, memory read/write only, no auditing.
  # connector-id-by-feature: shared memory connector (SIGNIFICANT_EVENTS_MEMORY_INFERENCE_FEATURE_ID).
  # plugin-id: step-specific cost attribution; aggregate-by: SIGNIFICANT_EVENTS_INFERENCE_PARENT_FEATURE_ID.
  - name: merge_investigation_gaps
    type: ai.agent
    connector-id-by-feature: 'significant_events_memory'
    plugin-id: 'significant_events_memory_investigation_gaps'
    aggregate-by: 'significant_events'
    create-conversation: false
    with:
      timeout: 120s
      message: |
        Call load_skill with path skills/platform/streams/significant-events-memory to get the memory tools.

        The following knowledge gaps were identified during an investigation:

        {{ steps.investigate.output.structured_output.gaps_found | json }}

        Keep only gaps that are actionable structural deficiencies — a data source or access that is missing and could reasonably be provided (e.g. "No traces for the cart service", "No infrastructure metrics for host X", "No code repository access for service Y"). Discard incident-specific observations that just describe what happened during the outage (e.g. "the pod crashed", "no logs during the failure window").

        Read the current _gaps/overview page with platform_sig_events_memory_read. Compare the filtered gaps against it. If every gap is already reflected there, stop and write nothing. If there are genuinely new gaps, weave them into the existing sections (do not add a separate section) and save the page with platform_sig_events_memory_write using categories ["_system/gaps"].
    on-failure:
      continue: true
