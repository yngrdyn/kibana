- file:
    name: 274792.yaml
    checksum: e6fb325677e516e0d7cbaf71c7f24a36a017d5f7
  type: breaking-change
  title: Dashboards and Visualizations APIs use short-hand duration units
  products:
  - product: cloud-serverless
    target: 2026-07-09
  description: The `duration` format used in visualization configuration now uses short-hand unit values aligned with {{esql}} conventions for its `from` and `to` options. This affects the `api/visualizations` and `api/dashboards` APIs, for both by-value and by-reference panels. For example, `minutes` becomes `min`, `humanize` becomes `auto-approximate`, and `humanizePrecise` becomes `auto`.
  impact: API requests that configure duration formats with the previous verbose unit names (for example, `minutes`, `humanize`, or `asMilliseconds`) are rejected.
  action: Update the duration `from` and `to` values in your visualization and dashboard panel API payloads to the new short-hand units. Refer to the [Dashboards API reference](https://dashboardsapispec.kibana.dev/index.html) for the updated schemas.
  areas:
  - Alerting and reporting
  - Dashboards and visualizations
  prs:
  - https://github.com/elastic/kibana/pull/274792
  issues:
  - https://github.com/elastic/kibana/issues/265849
