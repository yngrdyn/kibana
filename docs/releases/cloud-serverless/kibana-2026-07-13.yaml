  description: This introduces breaking changes to their request and response schemas. Refer to [Breaking changes](https://www.elastic.co/docs/release-notes/cloud-serverless/breaking-changes) for details and the actions you might need to take.
  prs:
  - '# PRIVATE: https://github.com/elastic/docs-content/pull/7338'
