entries:
- file:
    name: 268951.yaml
    checksum: 5895245a35a8a2fce86dd0da3a23f598ab31698f
  type: breaking-change
  title: Dashboards API search endpoint uses a new response schema and enforces a page size limit
  products:
  - product: cloud-serverless
    target: 2026-07-07
  description: The response envelope for the Dashboards API search endpoint changed from `{ dashboards, page, total }` to `{ data, meta }`, where the pagination fields (`page`, `per_page`, and `total`) move under `meta`. The endpoint also enforces a maximum `per_page` of 1000.
  impact: Requests that set `per_page` above 1000 are rejected. Clients that read `dashboards`, `page`, or `total` from the top level of the response no longer receive those fields.
  action: Update Dashboards API search clients to read results from `data` and pagination from `meta`, and keep `per_page` at or below 1000. Refer to the [Dashboards API reference](https://dashboardsapispec.kibana.dev/index.html) for the updated schemas.
  areas:
  - Dashboards and visualizations
  prs:
  - https://github.com/elastic/kibana/pull/268951
  issues:
  - https://github.com/elastic/kibana/issues/267607
- file:
    name: 1783971707-the-dashboards-and-visualizations-apis-are-now-gen.yaml
    checksum: e3020cffae02a60f62f7d138187da29173f89934
  type: feature
  title: The Dashboards and Visualizations APIs are now generally available
  products:
