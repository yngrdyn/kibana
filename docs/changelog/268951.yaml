title: Align Dashboard API search endpoint schema with As Code schemas
impact: "Dashboard API search request and response schemas change when `asCode.useGASchemas` is enabled. Requests are limited to a `per_page` of 1000, and responses use a `data` and `meta` structure instead of `dashboards`, `page`, and `total`."
action: "Update Dashboard API clients to use the `data` and `meta` response fields and respect the `per_page` limit. Test integrations against the new schema before the `asCode.useGASchemas` flag is enabled for your deployment."
