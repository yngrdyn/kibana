title: Fix Logstash output client SSL certificate/key incorrectly required
description: Fixed a bug where the Fleet UI incorrectly required Client SSL certificate and Client SSL certificate key for Logstash outputs when SSL was enabled, preventing users from configuring server-only TLS. The client cert and key are now optional but required together (both or neither) to support correct mTLS configuration.
