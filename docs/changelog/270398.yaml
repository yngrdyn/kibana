title: Add min_* rollover fields
description: Adds support for configuring minimum rollover conditions in Index Lifecycle Management policies. Users can now set `min_age`, `min_docs`, `min_size`, `min_primary_shard_docs`, and `min_primary_shard_size` in the hot phase rollover action, alongside the existing maximum rollover triggers.
