title: Enable traces for all users
description: Enable OpenTelemetry trace collection in Agent Builder for all users. You can view trace waterfalls for each conversation response, use the built-in traces skill to query token usage and latency, and monitor agent activity in the overview dashboard. Sensitive data such as prompts and tool parameters is excluded by default. To adjust tracing behavior, go to Management > Gen AI Settings > Agent Builder Tracing.
