title: "Fix Kibana startup crash when upgrading with preserved `node.options`"
description: "Upgrading Kibana with a preserved `node.options` file from a previous version no longer crashes at startup. Server-side code no longer imports the browser-only `@elastic/charts` library, which could load an ESM-only dependency incompatible with Node.js `require()`."
