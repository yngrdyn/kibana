# This file is hand-authored and must be edited manually.
# Unlike package moon.yml files, it is NOT generated by @kbn/moon and will not
# be overwritten by node scripts/regenerate_moon_projects.js (which only
# iterates kibana.jsonc packages). Do not add a kibana.jsonc here.

$schema: https://moonrepo.dev/schemas/project.json
id: 'kibana-buildkite'
language: typescript
toolchains:
  default: node
owners:
  defaultOwner: '@elastic/kibana-operations'
project:
  title: 'kibana-buildkite'
  description: Moon project for the .buildkite directory (standalone npm workspace)
  sourceRoot: .buildkite

workspace:
  inheritedTasks:
    include: []

tasks:
  # `.buildkite` tests read fixtures via process.cwd() expecting the repo root
  # (matching how the pipeline scripts run in CI), so jest must run from the
  # workspace root. Jest still scopes discovery to `.buildkite` because rootDir
  # defaults to the location of jest.config.js. We invoke `.buildkite`'s own jest
  # binary (its isolated npm workspace), not the repo-root scripts/jest.
  jest:
    command: .buildkite/node_modules/.bin/jest
    args:
      - '--config'
      - .buildkite/jest.config.js
    options:
      runFromWorkspaceRoot: true
    inputs:
      - '**/*'
