name: OpenAPI publish (stateful)

on:
  push:
    branches:
      - main
      - '[0-9]+.[0-9]+'
    paths:
      - 'oas_docs/output/kibana.yaml'

concurrency:
  group: openapi-publish-stateful-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'elastic/kibana'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: elastic/docs-actions/openapi/lint@v1
        with:
          spec-path: oas_docs/output/kibana.yaml

      - uses: elastic/docs-actions/openapi/upload@v1
        with:
          spec-path: oas_docs/output/kibana.yaml
          spec-name: kibana
